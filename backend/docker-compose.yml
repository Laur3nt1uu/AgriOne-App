services:
  postgres:
    image: postgres:16-alpine
    container_name: agrione_postgres
    restart: unless-stopped
    environment:
      # Optional overrides (defaults keep current behavior)
      POSTGRES_DB: ${AGRIONE_POSTGRES_DB:-agrione}
      POSTGRES_USER: ${AGRIONE_POSTGRES_USER:-agrione}
      POSTGRES_PASSWORD: ${AGRIONE_POSTGRES_PASSWORD:-agrione_pass}
    ports:
      - "${AGRIONE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - agrione_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AGRIONE_POSTGRES_USER:-agrione} -d ${AGRIONE_POSTGRES_DB:-agrione}"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: agrione_pgadmin
    restart: unless-stopped
    environment:
      # Optional overrides (defaults keep current behavior)
      PGADMIN_DEFAULT_EMAIL: ${AGRIONE_PGADMIN_EMAIL:-admin@localhost.com}
      PGADMIN_DEFAULT_PASSWORD: ${AGRIONE_PGADMIN_PASSWORD:-admin123}
    ports:
      - "${AGRIONE_PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - agrione_pgadmin:/var/lib/pgadmin

volumes:
  agrione_pgdata:
  agrione_pgadmin:
