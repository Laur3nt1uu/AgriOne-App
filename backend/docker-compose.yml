services:
  postgres:
    image: postgres:16-alpine
    container_name: agrione_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agrione
      POSTGRES_USER: agrione
      POSTGRES_PASSWORD: agrione_pass
    ports:
      - "5432:5432"
    volumes:
      - agrione_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrione -d agrione"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: agrione_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@localhost.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - agrione_pgadmin:/var/lib/pgadmin

volumes:
  agrione_pgdata:
  agrione_pgadmin:
